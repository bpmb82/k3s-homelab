---
- name: Check if cilium is already installed and running
  ansible.builtin.shell: cilium version | grep -c cilium || /bin/true
  register: cilium_install

- name: Create the cilium config folder
  ansible.builtin.file:
    path: "{{ ik3s_workdir }}/cilium"
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Continue if cilium is not installed
  when: cilium_install.stdout == "0"
  block:

    - name: Run cilium install script
      ansible.builtin.shell: |
        CILIUM_CLI_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
        CLI_ARCH=amd64
        if [ "$(uname -m)" = "aarch64" ]; then CLI_ARCH=arm64; fi
        curl -L --fail --remote-name-all https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-${CLI_ARCH}.tar.gz{,.sha256sum}
        sha256sum --check cilium-linux-${CLI_ARCH}.tar.gz.sha256sum
        tar xzvfC cilium-linux-${CLI_ARCH}.tar.gz /usr/local/bin
        rm -f cilium-linux-${CLI_ARCH}.tar.gz{,.sha256sum}
    
    - name: Install cilium to the cluster
      ansible.builtin.shell: |
        cilium install \
        --set=ipam.operator.clusterPoolIPv4PodCIDRList="10.42.0.0/16" \
        --set=bpf.masquerade=true \
        --set=kubeProxyReplacement=true \
        --set=k8sServiceHost={{ ik3s_private_ip }} \
        --set=k8sServicePort=6443 \
        --set=l2announcements.enabled=true \
        --set=externalIPs.enabled=true \
        --set encryption.enabled=true \
        --set encryption.type=wireguard \
        --set authentication.mutual.enabled=true \
        --set authentication.mutual.spire.enabled=true \
        --set authentication.mutual.spire.install.server.dataStorage.enabled=true \
        --set authentication.mutual.spire.install.server.securityContext.runAsUser=1000 \
        --set authentication.mutual.spire.install.server.securityContext.runAsGroup=1000 \
        --set authentication.mutual.spire.install.server.securityContext.fsGroup=1000 \
        --set authentication.mutual.spire.install.server.securityContext.readOnlyRootFilesystem=false \
        --set authentication.mutual.spire.install.server.initContainers[0].name=set-dir-permissions \
        --set authentication.mutual.spire.install.server.initContainers[0].image=busybox \
        --set authentication.mutual.spire.install.server.initContainers[0].command[0]=sh \
        --set authentication.mutual.spire.install.server.initContainers[0].command[1]=-c \
        --set authentication.mutual.spire.install.server.initContainers[0].command[2]="chown -R 1000:1000 /var/run/spire-server/sockets" \
        --set authentication.mutual.spire.install.server.initContainers[0].securityContext.privileged=true \
        --set authentication.mutual.spire.install.server.initContainers[0].volumeMounts[0].name=spire-server-socket \
        --set authentication.mutual.spire.install.server.initContainers[0].volumeMounts[0].mountPath=/var/run/spire-server/sockets \
        --set authentication.mutual.spire.install.agent.hostNetwork=true \
        --set l7Proxy=true

    # - name: Enable cilium loadbalancer
    #   ansible.builtin.shell: |
    #     cilium config set enable-lb-ipam true
    #     cilium config set enable-l2-announcements true

- name: Upgrade cilium
  ansible.builtin.shell: |
    cilium upgrade \
    --set=ipam.operator.clusterPoolIPv4PodCIDRList="10.42.0.0/16" \
    --set=bpf.masquerade=true \
    --set=kubeProxyReplacement=true \
    --set=k8sServiceHost={{ ik3s_private_ip }} \
    --set=k8sServicePort=6443 \
    --set=l2announcements.enabled=true \
    --set=externalIPs.enabled=true \
    --set encryption.enabled=true \
    --set encryption.type=wireguard \
    --set authentication.mutual.enabled=true \
    --set authentication.mutual.spire.enabled=true \
    --set authentication.mutual.spire.install.server.dataStorage.enabled=true \
    --set authentication.mutual.spire.install.server.securityContext.runAsUser=1000 \
    --set authentication.mutual.spire.install.server.securityContext.runAsGroup=1000 \
    --set authentication.mutual.spire.install.server.securityContext.fsGroup=1000 \
    --set authentication.mutual.spire.install.server.securityContext.readOnlyRootFilesystem=false \
    --set authentication.mutual.spire.install.agent.hostNetwork=true \
    --set l7Proxy=true

- name: Wait until healthy
  ansible.builtin.shell: cilium status --wait

- name: Copy cilium L2 policy
  ansible.builtin.template:
    src: templates/cilium-l2-policy.yml.j2
    dest: "{{ ik3s_workdir }}/cilium/cilium-l2-policy.yml"
    mode: "0644"

- name: Apply cilium L2 policy
  ansible.builtin.shell: kubectl apply -f {{ ik3s_workdir }}/cilium/cilium-l2-policy.yml

- name: Copy cilium loadbalancer pool template
  ansible.builtin.template:
    src: templates/cilium-loadbalancer-pool.yml.j2
    dest: "{{ ik3s_workdir }}/cilium/cilium-loadbalancer-pool.yml"
    mode: "0644"

- name: Apply the cilium loadbalancer pool template
  ansible.builtin.shell: kubectl apply -f "{{ ik3s_workdir }}/cilium/cilium-loadbalancer-pool.yml"

