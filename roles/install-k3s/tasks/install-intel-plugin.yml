---
- name: Create the namespace {{ ik3s_intel_namespace }}
  kubernetes.core.k8s:
    name: "{{ ik3s_intel_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Build Intel GPU manifests via Kustomize
  ansible.builtin.shell:
    cmd: "kubectl kustomize https://github.com/intel/intel-device-plugins-for-kubernetes/deployments/nfd/overlays/node-feature-rules?ref={{ ik3s_intel_release }}"
  register: intel_gpu_manifest
  changed_when: false

- name: Apply Intel GPU NodeFeatureRules
  kubernetes.core.k8s:
    state: present
    definition: "{{ intel_gpu_manifest.stdout | from_yaml_all }}"
    namespace: "{{ ik3s_intel_namespace }}"

- name: Build Intel GPU daemonset via Kustomize
  ansible.builtin.shell:
    cmd: "kubectl kustomize https://github.com/intel/intel-device-plugins-for-kubernetes/deployments/gpu_plugin/overlays/nfd_labeled_nodes?ref={{ ik3s_intel_release }}"
  register: intel_gpu_daemonset
  changed_when: false

- name: Create Intel GPU plugin daemonset
  kubernetes.core.k8s:
    state: present
    namespace: "{{ ik3s_intel_namespace }}"
    definition: "{{ intel_gpu_daemonset.stdout | from_yaml_all }}"
    wait: true
