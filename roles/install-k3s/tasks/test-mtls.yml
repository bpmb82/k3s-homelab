- name: DEBUG - Check of pods wel een SPIFFE ID hebben
  ansible.builtin.shell: |
    kubectl -n cilium-spire exec spire-server-0 -- ./bin/spire-server entry show -selector k8s:ns:{{ ik3s_mtls_test_namespace }}
  register: spire_entries
  changed_when: false

- name: Toon SPIRE entries
  ansible.builtin.debug:
    var: spire_entries.stdout_lines

- name: Verifieer SPIRE authenticatie in Cilium BPF maps
  ansible.builtin.shell: |
    CILIUM_POD=$(kubectl -n kube-system get pods -l k8s-app=cilium -o jsonpath='{.items[0].metadata.name}')
    kubectl -n kube-system exec $CILIUM_POD -- cilium-dbg bpf auth list
  register: bpf_auth
  until: "'spire' in bpf_auth.stdout and 'OK' in bpf_auth.stdout"
  retries: 3
  delay: 2
  changed_when: false

- name: Rapportage mTLS status
  ansible.builtin.debug:
    msg: "mTLS Verificatie Geslaagd: SPIRE identiteit gevonden in BPF maps voor {{ ik3s_mtls_test_namespace }}"

- name: Remove test resources
  ansible.builtin.shell: "kubectl delete namespace {{ ik3s_mtls_test_namespace }} --wait=false"
  when: ik3s_mtls_test_cleanup | default(true)
  changed_when: true