---
# tasks file for cockpit
- name: Install cockpit on RedHat based systems
  when: ansible_facts['os_family'] == "RedHat"
  block:
    - name: Install all packages using dnf
      ansible.builtin.dnf:
        name:
          - cockpit
          - cockpit-bridge
          - cockpit-files
          - cockpit-ha-cluster
          - cockpit-image-builder
          - cockpit-kdump
          - cockpit-machines
          - cockpit-networkmanager
          - cockpit-packagekit
          - cockpit-podman
          - cockpit-selinux
          - cockpit-session-recording
          - cockpit-sosreport
          - cockpit-storaged
          - cockpit-system
          - cockpit-ws
          - cockpit-ws-selinux
        state: present
        update_cache: true

- name: Install cockpit on Debian based systems
  when: ansible_facts['os_family'] == "Debian"
  block:
    - name: Install all packages using apt
      ansible.builtin.apt:
        name:
          - cockpit
          - cockpit-bridge
          - cockpit-doc
          - cockpit-machines
          - cockpit-networkmanager
          - cockpit-packagekit
          - cockpit-podman
          - cockpit-sosreport
          - cockpit-storaged
          - cockpit-system
          - cockpit-ws
        state: present
        update_cache: true

- name: Enable the cockpit systemd service
  ansible.builtin.service:
    name: cockpit
    state: started
    enabled: true
