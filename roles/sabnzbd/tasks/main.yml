---
# tasks file for {{ snzb_service }}
- name: Create the workdir
  ansible.builtin.file:
    path: "{{ workdir }}/{{ snzb_service }}/config"
    state: directory
    mode: '0755'

- name: Create k8s namespace for {{ snzb_service }}
  kubernetes.core.k8s:
    name: "{{ snzb_kube_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Install the helm-charts helm repo
  ansible.builtin.include_role:
    name: install-homelab-charts-repo

- name: Get information on deployment/{{ snzb_service }}
  kubernetes.core.k8s_info:
    kind: Deployment
    name: "{{ snzb_service }}"
    namespace: "{{ snzb_kube_namespace }}"
  register: snzb_status

- name: Create config PV and PVC
  ansible.builtin.import_role:
    name: persistent-volume
  vars:
    pv_name_label: "{{ snzb_service }}-config"
    pv_kube_namespace: "{{ snzb_kube_namespace }}"
    pv_host_path: "{{ snzb_workdir }}/{{ snzb_service }}/config"
    pv_servicedir: "{{ snzb_workdir }}/{{ snzb_service }}"

- name: Create downloads PVC
  ansible.builtin.import_role:
    name: persistent-volume
  vars:
    pv_name_label: "{{ snzb_service }}-downloads"
    pv_kube_namespace: "{{ snzb_kube_namespace }}"
    pv_host_path: "{{ downloads_dir }}"
    pv_servicedir: "{{ snzb_workdir }}/{{ snzb_service }}"

- name: Deploy chart for {{ snzb_service }}
  kubernetes.core.helm:
    name: "{{ snzb_service }}"
    chart_ref: homelab-charts/{{ snzb_service }}
    release_namespace: "{{ snzb_kube_namespace }}"
    update_repo_cache: true
    wait: true
    timeout: "600s"
    values: "{{ lookup('ansible.builtin.template', 'templates/values.yml.j2') | from_yaml }}"

- name: Create Traefik ingressroutes
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('ansible.builtin.template', 'templates/traefik_ingress.yml.j2') | from_yaml }}"

- name: Initial config change, we will need to update the config file to support Traefik and then restart sabnzbd
  when: snzb_status.resources | length == 0
  block:

    - name: Wait until {{ snzb_service }} finished its configuration
      ansible.builtin.shell: grep -c host_whitelist {{ snzb_workdir }}/{{ snzb_service }}/config/{{ snzb_service }}.ini
      register: snzb_config_ready
      until: snzb_config_ready.stdout == "1"
      retries: 40
      delay: 20

    - name: Get configuration
      ansible.builtin.shell: "awk '/host_whitelist/{print $3}' {{ snzb_workdir }}/{{ snzb_service }}/config/{{ snzb_service }}.ini | tr -d ,"
      register: snzb_host_whitelist

    - name: Change the configuration
      ansible.builtin.shell: "sed -i 's/{{ snzb_host_whitelist.stdout }}/{{ snzb_service }}.{{ domain }}/g' {{ snzb_workdir }}/{{ snzb_service }}/config/{{ snzb_service }}.ini"

    - name: Trigger a restart of the Sabnzbd deployment
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ snzb_service }}"
            namespace: "{{ snzb_kube_namespace }}"
            annotations:
              ansible.kubernetes.io/restartedAt: "{{ lookup('pipe', 'date +%Y-%m-%dT%H:%M:%SZ') }}"
        state: patched
