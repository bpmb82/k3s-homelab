---
# tasks file for {{ ha_service }}
- name: Create the workdir
  ansible.builtin.file:
    path: "{{ workdir }}/{{ ha_service }}/config"
    state: directory
    mode: '0755'

- name: Create k8s namespace for {{ ha_service }}
  kubernetes.core.k8s:
    name: "{{ ha_kube_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Get information on deployment/{{ ha_service }}
  kubernetes.core.k8s_info:
    kind: Deployment
    name: "{{ ha_service }}"
    namespace: "{{ ha_kube_namespace }}"
  register: ha_status

- name: Create wakeonlan files if enabled
  ansible.builtin.include_tasks: wakeonlan.yml
  when: ha_wakeonlan is defined

- name: Get node information
  kubernetes.core.k8s_info:
    kind: Node
  register: node_list

- name: Copy configuration file if it does not exist
  ansible.builtin.template:
    src: templates/configuration.yaml.j2
    dest: "{{ ha_workdir }}/{{ ha_service }}/config/configuration.yaml"
    mode: "0644"
    force: false

- name: Install the helm-charts helm repo
  ansible.builtin.include_role:
    name: install-homelab-charts-repo

- name: Create config PV and PVC
  ansible.builtin.import_role:
    name: persistent-volume
  vars:
    pv_name_label: "{{ ha_service }}"
    pv_kube_namespace: "{{ ha_kube_namespace }}"
    pv_host_path: "{{ ha_workdir }}/{{ ha_service }}/config"
    pv_servicedir: "{{ ha_workdir }}/{{ ha_service }}"

- name: Deploy chart for {{ ha_service }}
  kubernetes.core.helm:
    name: "{{ ha_service }}"
    chart_ref: homelab-charts/{{ ha_service }}
    release_namespace: "{{ ha_kube_namespace }}"
    update_repo_cache: true
    wait: true
    timeout: "600s"
    values: "{{ lookup('ansible.builtin.template', 'templates/values.yml.j2') | from_yaml }}"

- name: Deploy prometheus ServiceMonitor
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('ansible.builtin.template', 'templates/prometheus-servicemonitor.yml.j2') | from_yaml }}"

- name: Create Traefik ingressroutes
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('ansible.builtin.template', 'templates/traefik_ingress.yml.j2') | from_yaml }}"

- name: Do stuff for HACS
  when: ha_hacs == true and ha_status.resources | length == 0
  block:
    - name: Run the HACS script
      ansible.builtin.shell: cd {{ ha_workdir }}/{{ ha_service }}/config && wget -O - https://get.hacs.xyz | bash -

    - name: Trigger a restart of the Homeassistants deployment
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ ha_service }}"
            namespace: "{{ ha_kube_namespace }}"
            annotations:
              ansible.kubernetes.io/restartedAt: "{{ lookup('pipe', 'date +%Y-%m-%dT%H:%M:%SZ') }}"
        state: patched
