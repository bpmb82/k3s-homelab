---
# tasks file for {{ srr_service }}
- name: Create the workdir
  ansible.builtin.file:
    path: "{{ workdir }}/{{ srr_service }}/config"
    state: directory
    mode: '0755'
    owner: 1000
    group: 1000

- name: Create k8s namespace for {{ srr_service }}
  kubernetes.core.k8s:
    name: "{{ srr_kube_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Install the helm-charts helm repo
  ansible.builtin.include_role:
    name: install-homelab-charts-repo

- name: Create config PV and PVC
  ansible.builtin.import_role:
    name: persistent-volume
  vars:
    pv_name_label: "{{ srr_service }}-config"
    pv_kube_namespace: "{{ srr_kube_namespace }}"
    pv_host_path: "{{ workdir }}/{{ srr_service }}/config"
    pv_servicedir: "{{ workdir }}/{{ srr_service }}"

- name: Create downloads PVC
  ansible.builtin.import_role:
    name: persistent-volume
  vars:
    pv_name_label: "{{ srr_service }}-downloads"
    pv_kube_namespace: "{{ srr_kube_namespace }}"
    pv_host_path: "{{ downloads_dir }}"
    pv_servicedir: "{{ workdir }}/{{ srr_service }}"

- name: Deploy chart for {{ srr_service }}
  kubernetes.core.helm:
    name: "{{ srr_service }}"
    chart_ref: homelab-charts/{{ srr_service }}
    release_namespace: "{{ srr_kube_namespace }}"
    update_repo_cache: true
    wait: true
    timeout: "600s"
    values: "{{ lookup('ansible.builtin.template', 'templates/values.yml.j2') | from_yaml }}"

- name: Create Traefik ingressroutes
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('ansible.builtin.template', 'templates/traefik_ingress.yml.j2') | from_yaml }}"
